services:
  - type: web
    name: logfast-api
    runtime: python
    repo: https://github.com/VickPeng/logfast
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: SECRET_KEY
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://api.deepseek.com/v1
      - key: AI_MODEL
        value: deepseek-v4-flash
      - key: FRONTEND_URL
        value: https://logfast-beta.vercel.app
      - key: API_BASE_URL
        value: https://logfast-api.onrender.com
